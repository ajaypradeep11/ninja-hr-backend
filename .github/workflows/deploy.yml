# Deploys the backend to Cloud Run on every push to main.
#
# Auth uses Workload Identity Federation (keyless) — the values below are the
# WIF provider resource name and the deploy service account, neither of which
# is a secret, so no GitHub secrets are required. The one-time GCP setup
# (WIF pool/provider + github-deployer SA + IAM roles) is documented in
# .github/workflows/README-deploy.md.
#
# Deploying with only --image preserves the service's existing env vars,
# Secret Manager references, ingress, and runtime service account.
name: Deploy backend (Cloud Run)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: ninjahr
  REGION: us-central1
  SERVICE: ninja-hr-api
  IMAGE: us-central1-docker.pkg.dev/ninjahr/cloud-run-source-deploy/ninja-hr-api

permissions:
  contents: read
  id-token: write # required to mint the OIDC token for Workload Identity Federation

jobs:
  # Gate: nothing deploys unless lint + unit tests pass on the exact commit.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      # The package's lint script uses --fix (mutates files); CI must only check.
      - run: npx eslint "{src,test}/**/*.ts"
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/1004736454481/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@ninjahr.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # Two images from one Dockerfile (shared layer cache): the slim serving
      # image and the ops image (prisma CLI + schema) that runs migrations.
      # No mutable :latest tag — everything that runs is pinned to a SHA.
      - name: Build and push images
        run: |
          docker build --target runtime -t "$IMAGE:$GITHUB_SHA" .
          docker build --target ops -t "$IMAGE:$GITHUB_SHA-ops" .
          docker push "$IMAGE:$GITHUB_SHA"
          docker push "$IMAGE:$GITHUB_SHA-ops"

      # Migrations run as a Cloud Run JOB before the service deploys — the
      # serving container no longer migrates at boot, so cold starts can't
      # race DDL and the service's DB user doesn't need DDL rights.
      # One-time setup: create the job once with the DB connection wired up
      #   gcloud run jobs create ninja-hr-migrate --image <any-ops-image> \
      #     --region us-central1 --set-secrets DATABASE_URL=...,DIRECT_URL=... \
      #     --set-cloudsql-instances <instance> --max-retries 0
      # Subsequent `jobs update --image` calls preserve that configuration.
      - name: Apply database migrations
        run: |
          gcloud run jobs update ninja-hr-migrate \
            --image "$IMAGE:$GITHUB_SHA-ops" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --quiet
          gcloud run jobs execute ninja-hr-migrate \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --wait

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:$GITHUB_SHA" \
            --region "$REGION" \
            --project "$PROJECT_ID" \
            --quiet
